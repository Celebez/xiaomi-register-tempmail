name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    name: Python Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python file
        run: python -m py_compile batch_tempmail.py

      - name: Verify --help output
        run: python batch_tempmail.py --help

  json-validation:
    name: JSON Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON files
        run: |
          python -c "import json; json.load(open('package.json'))"
          python -c "import json; json.load(open('docs/payload_template.json'))"

  node-bridge:
    name: Node.js Bridge Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install crypto-js in scripts/
        run: |
          cd scripts
          npm install crypto-js

      - name: Test EUI encryption
        run: |
          cd scripts
          node encrypt.cjs '{"email":"test@example.com","password":"TestPass123!"}' | python -c "import sys, json; d=json.load(sys.stdin); assert 'EUI' in d; assert 'encryptedParams' in d; print('✓ EUI:', d['EUI'][:50], '...')"